let y=e.clientY-rect.top

y=Math.max(circleSize/2,Math.min(rect.height-circleSize/2,y))

circle.style.top=(y-circleSize/2)+"px"

event.stopPropagation()
})

area.appendChild(circle)

circles.push(circle)

createNumber++

})

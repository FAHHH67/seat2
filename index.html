<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat goat</title>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:sans-serif;
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

#layout{
display:flex;
gap:40px;
align-items:center;
}

#seatArea{
width:1800px;
height:1100px;
background:white;
border:3px solid black;
border-radius:12px;
position:relative;
cursor:pointer;
}

#panel{
width:220px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#panel button{
width:100%;
margin-top:10px;
padding:10px;
font-size:18px;
cursor:pointer;
}

#panel input{
width:100%;
margin-top:6px;
margin-bottom:6px;
padding:7px;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
background:white;
cursor:pointer;
}

#skullBtn{
position:relative;
height:60px;
font-size:28px;
overflow:hidden;
}

#skullText{
transition:opacity 0.4s;
}

#skullImg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
opacity:0;
transition:opacity 0.5s;
pointer-events:none;
}

</style>
</head>

<body>

<div id="layout">

<div id="seatArea"></div>

<div id="panel">

<div>맞춤 설정</div>
<input id="numbers" placeholder="예: 1-5,8,11-13">

<button onclick="undo()">되돌리기</button>

<button id="skullBtn" onclick="startSeat()">
<span id="skullText">☠️</span>
<img id="skullImg">
</button>

<button onclick="resetAll()">초기화</button>

</div>

</div>

<script>

let area=document.getElementById("seatArea")
let circles=[]
let createNumber=1

area.addEventListener("click",function(e){

if(e.target.classList.contains("circle")) return

let rect=area.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=(x-35)+"px"
circle.style.top=(y-35)+"px"

circle.onclick=function(ev){
ev.stopPropagation()
}

area.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function parseNumbers(input){

let result=[]
let parts=input.split(",")

parts.forEach(p=>{

p=p.trim()

if(p.includes("-")){

let [a,b]=p.split("-").map(Number)

for(let i=a;i<=b;i++){
result.push(i)
}

}else{

let n=parseInt(p)
if(!isNaN(n)) result.push(n)

}

})

return result

}

function shuffleNumbers(){

let text=document.getElementById("numbers").value

let numbers=parseNumbers(text)

numbers.sort(()=>Math.random()-0.5)

circles.forEach((c,i)=>{

if(numbers[i]!==undefined){
c.innerText=numbers[i]
}

})

}

function startSeat(){

shuffleNumbers()

let imgs=["2.png","3.png","9.png"]

let random=imgs[Math.floor(Math.random()*imgs.length)]

let img=document.getElementById("skullImg")
let skull=document.getElementById("skullText")

img.src=random

skull.style.opacity=0
img.style.opacity=1

setTimeout(()=>{
img.style.opacity=0
skull.style.opacity=1
},2000)

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
